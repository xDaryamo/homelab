name: validate

on:
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: kustomize build
        run: |
          kustomize build clusters/main
          kustomize build infrastructure/controllers
          kustomize build infrastructure/configs
          kustomize build monitoring/controllers
          kustomize build monitoring/configs
          kustomize build apps/production
          kustomize build apps/staging
