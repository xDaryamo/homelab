apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: hyperion
  name: hyperion
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hyperion
  template:
    metadata:
      labels:
        app: hyperion
    spec:
      containers:
      - name: hyperion-ng
        image: sirfragalot/hyperion.ng:2.2.0
        ports:
        - containerPort: 8090
          name: web-ui
        - containerPort: 19444
          name: json-api
        - containerPort: 19445
          name: proto-grabber
        - containerPort: 19400
          name: flat-buffer
        volumeMounts:
        - name: config-volume
          mountPath: /root/.hyperion
        readinessProbe:
          httpGet:
            path: /
            port: 8090
          initialDelaySeconds: 20
          periodSeconds: 30
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /
            port: 8090
          initialDelaySeconds: 60
          periodSeconds: 30
          failureThreshold: 6
      # Watchdog sidecar: runs INSIDE the same pod, so it talks to Hyperion over
      # localhost (a "local" connection -> no API auth required, unlike an
      # external CronJob which gets "No Authorization").
      # Every 20s:
      #   1) if Hyperion has auto-disabled the LEDDEVICE (e.g. the WLED was
      #      momentarily unreachable when streaming stopped), re-enable it;
      #   2) if there is no active source (empty priorities, PC powered off),
      #      force the WLED off via its own API AND set lor:1 (live override
      #      "until reboot"): with lor:0 a lingering realtime/live stream keeps
      #      priority over on/off and freezes the strip on the last frame, so
      #      {"on":false} alone is not enough. When a source becomes active
      #      again we release the override (lor:0) so the live stream shows.
      - name: led-watchdog
        image: curlimages/curl:8.21.0
        env:
        - name: WLED_HOST
          value: ""
        command:
        - /bin/sh
        - -c
        - |
          set -u
          prev=""
          while true; do
            info=$(curl -fsS -m 8 -X POST http://localhost:8090/json-rpc \
              -H 'Content-Type: application/json' \
              -d '{"command":"serverinfo"}' 2>/dev/null | tr -d ' \n\t\r')
            if [ -n "$info" ]; then
              case "$info" in
                *'"enabled":false,"name":"LEDDEVICE"'*)
                  curl -fsS -m 8 -X POST http://localhost:8090/json-rpc \
                    -H 'Content-Type: application/json' \
                    -d '{"command":"componentstate","componentstate":{"component":"LEDDEVICE","state":true}}' \
                    >/dev/null 2>&1 \
                    && echo "$(date -u +%FT%TZ) LEDDEVICE was disabled -> re-enabled"
                  ;;
              esac
              case "$info" in
                *'"priorities":[]'*)
                  if [ -n "$WLED_HOST" ]; then
                    # lor:1 makes WLED ignore any lingering live stream so
                    # on:false actually blanks the strip.
                    curl -fsS -m 8 -X POST "http://$WLED_HOST/json/state" \
                      -H 'Content-Type: application/json' -d '{"on":false,"lor":1}' \
                      >/dev/null 2>&1
                  fi
                  [ "$prev" != idle ] && echo "$(date -u +%FT%TZ) no active source -> WLED $WLED_HOST turned off"
                  prev=idle
                  ;;
                *)
                  # Source active again: release the override so Hyperion's
                  # realtime stream is shown again (only on idle->active edge).
                  if [ "$prev" != active ] && [ -n "$WLED_HOST" ]; then
                    curl -fsS -m 8 -X POST "http://$WLED_HOST/json/state" \
                      -H 'Content-Type: application/json' -d '{"on":true,"lor":0}' \
                      >/dev/null 2>&1 \
                      && echo "$(date -u +%FT%TZ) active source -> WLED $WLED_HOST live override released"
                  fi
                  prev=active
                  ;;
              esac
            fi
            sleep 20
          done
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            memory: 32Mi
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 65534
          capabilities:
            drop:
              - ALL
      volumes:
      - name: config-volume
        persistentVolumeClaim:
          claimName: hyperion-pvc
