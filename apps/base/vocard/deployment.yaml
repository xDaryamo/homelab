apiVersion: apps/v1
kind: Deployment
metadata:
  name: vocard
  labels:
    app: vocard
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vocard
  template:
    metadata:
      labels:
        app: vocard
    spec:
      initContainers:
        - name: init-config
          image: busybox:latest
          command: ["sh", "-c", "cp /config-vocard/settings.json /app-vocard/settings.json && cp /config-lavalink/application.yml /app-lavalink/application.yml"]
          volumeMounts:
            - name: settings-secret
              mountPath: /config-vocard
            - name: settings-volume
              mountPath: /app-vocard
            - name: lavalink-config-secret
              mountPath: /config-lavalink
            - name: lavalink-config-volume
              mountPath: /app-lavalink
      containers:
        - name: vocard
          image: ghcr.io/chocomeow/vocard:v2.7.2
          ports:
            - containerPort: 8000
              name: http
          volumeMounts:
            - name: settings-volume
              mountPath: /app/settings.json
              subPath: settings.json
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
        - name: lavalink
          image: ghcr.io/lavalink-devs/lavalink:4.1.2
          imagePullPolicy: IfNotPresent
          env:
            - name: _JAVA_OPTIONS
              value: "-Xmx1G"
          ports:
            - containerPort: 2333
              name: http
          volumeMounts:
            - name: lavalink-config-volume
              mountPath: /opt/Lavalink/application.yml
              subPath: application.yml
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
      volumes:
        - name: settings-secret
          secret:
            secretName: vocard-settings
        - name: settings-volume
          emptyDir: {}
        - name: lavalink-config-secret
          secret:
            secretName: lavalink-config
        - name: lavalink-config-volume
          emptyDir: {}
