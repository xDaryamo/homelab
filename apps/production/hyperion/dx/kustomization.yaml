apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../base/hyperion
nameSuffix: -dx
commonLabels:
  instance: dx
patches:
  - target:
      kind: Deployment
      name: hyperion
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: hyperion
      spec:
        template:
          spec:
            containers:
              - name: led-watchdog
                env:
                  - name: WLED_HOST
                    value: "192.168.1.97"
